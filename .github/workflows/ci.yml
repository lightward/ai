name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  lean:
    name: Lean (zero sorry)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: leanprover/lean-action@v1
        with:
          build-args: ""
          lake-package-directory: lean
      - name: Build each Lean file individually (surfaces hidden type errors)
        working-directory: lean
        run: |
          for f in Foam/*.lean; do
            mod="Foam.$(basename "$f" .lean)"
            echo "Building $mod..."
            lake build "$mod" || exit 1
          done
      - name: No warnings (sorry excluded)
        working-directory: lean
        run: |
          warns=0
          for f in Foam/*.lean; do
            mod="Foam.$(basename "$f" .lean)"
            touch "$f"
            # Collect warnings that aren't sorry declarations
            non_sorry=$(lake build "$mod" 2>&1 | grep "warning:" | grep -v "declaration uses .sorry." || true)
            if [ -n "$non_sorry" ]; then
              echo "$non_sorry"
              warns=$((warns + 1))
            fi
          done
          if [ $warns -gt 0 ]; then
            echo ""
            echo "Non-sorry warnings found. Fix before merging."
            exit 1
          fi
          echo "Clean: only sorry warnings (expected)"

  python:
    name: Python observations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
      - run: uv sync
      - run: uv run pytest -v

  readme:
    name: README is up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
      - run: uv sync
      - run: uv run python build_readme.py
      - run: git diff --exit-code README.md || (echo "README.md is stale — run 'uv run python build_readme.py'" && exit 1)

  integrity:
    name: Reference integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Check derivation references (every observed file is mapped)
        run: |
          errors=0

          echo "=== Observed files referenced in derivations ==="
          for f in derivations/observed/test_*.py; do
            [ -f "$f" ] || continue
            base=$(basename "$f")
            if ! grep -rq "$base" derivations/; then
              echo "UNMAPPED: $base (not referenced in any derivation)"
              errors=$((errors + 1))
            fi
          done

          echo "=== Lean files referenced in derivations ==="
          for f in lean/Foam/*.lean; do
            [ -f "$f" ] || continue
            base=$(basename "$f")
            if ! grep -rq "$base" derivations/ && ! grep -q "$base" lean/README.md; then
              echo "UNREFERENCED: $base"
              errors=$((errors + 1))
            fi
          done

          if [ $errors -gt 0 ]; then
            echo ""
            echo "$errors file(s) not referenced"
            exit 1
          fi
          echo "All files referenced"
